{% extends "admin/base.html" %}

{% block extrastyle %}
{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* Force dark mode always */
#django-admin-theme-toggle { display: none !important; }
<script>
document.documentElement.setAttribute('data-theme','dark');
localStorage.setItem('theme','dark');
</script>

:root, html, html[data-theme="dark"], html[data-theme="light"] {
  --primary:                  #818cf8 !important;
  --secondary:                #1e2130 !important;
  --accent:                   #818cf8 !important;
  --body-fg:                  #e2e8f0 !important;
  --body-bg:                  #0f1117 !important;
  --body-quiet-color:         #64748b !important;
  --body-loud-color:          #f1f5f9 !important;
  --header-color:             #f1f5f9 !important;
  --header-branding-color:    #818cf8 !important;
  --header-bg:                #13161f !important;
  --header-link-color:        #94a3b8 !important;
  --breadcrumbs-fg:           #64748b !important;
  --breadcrumbs-link-fg:      #818cf8 !important;
  --breadcrumbs-bg:           #1a1d27 !important;
  --link-fg:                  #818cf8 !important;
  --link-hover-color:         #a5b4fc !important;
  --link-selected-fg:         #818cf8 !important;
  --hairline-color:           #2a2f45 !important;
  --border-color:             #2a2f45 !important;
  --module-bg:                #1a1d27 !important;
  --module-fg:                #e2e8f0 !important;
  --module-header-bg:         #22263a !important;
  --module-header-fg:         #94a3b8 !important;
  --content-bg:               #0f1117 !important;
  --darkened-bg:              #1a1d27 !important;
  --selected-bg:              #22263a !important;
  --selected-row:             rgba(129,140,248,0.08) !important;
  --button-fg:                #0f1117 !important;
  --button-bg:                #818cf8 !important;
  --button-hover-bg:          #6366f1 !important;
  --default-button-bg:        #818cf8 !important;
  --default-button-hover-bg:  #6366f1 !important;
  --object-tools-fg:          #818cf8 !important;
  --object-tools-bg:          rgba(129,140,248,0.1) !important;
  --object-tools-hover-bg:    rgba(129,140,248,0.2) !important;
  --close-button-bg:          #22263a !important;
  --close-button-hover-bg:    #2a2f45 !important;
  --delete-button-bg:         #ef4444 !important;
  --delete-button-hover-bg:   #dc2626 !important;
  color-scheme: dark !important;
}

html, body {
  background: #0f1117 !important;
  color: #e2e8f0 !important;
  font-family: 'DM Sans', sans-serif !important;
}

/* Header */
#header {
  background: #13161f !important;
  border-bottom: 1px solid #2a2f45 !important;
  padding: 12px 24px !important;
  box-shadow: 0 1px 0 #2a2f45 !important;
}
#branding h1 a, #branding h1 a:visited {
  font-family: 'Syne', sans-serif !important;
  font-weight: 800 !important;
  color: #f1f5f9 !important;
}
#user-tools, #user-tools a { color: #64748b !important; font-size: 0.82rem !important; }
#user-tools a:hover { color: #e2e8f0 !important; }

/* Breadcrumbs */
div.breadcrumbs {
  background: #1a1d27 !important;
  border-bottom: 1px solid #2a2f45 !important;
  color: #64748b !important;
  padding: 8px 24px !important;
  font-size: 0.8rem !important;
}
div.breadcrumbs a { color: #818cf8 !important; text-decoration: none !important; }

/* Sidebar */
#nav-sidebar { background: #13161f !important; border-right: 1px solid #2a2f45 !important; }
.sticky { background: #13161f !important; border-bottom: 1px solid #2a2f45 !important; padding: 10px 12px !important; }
#nav-sidebar input { background: #0f1117 !important; border: 1px solid #2a2f45 !important; color: #e2e8f0 !important; border-radius: 6px !important; padding: 5px 10px !important; font-size: 0.82rem !important; width: 90% !important; outline: none !important; }
#nav-sidebar a { color: #64748b !important; font-size: 0.85rem !important; text-decoration: none !important; transition: all 0.15s !important; border-radius: 6px !important; }
#nav-sidebar a:hover { color: #e2e8f0 !important; background: rgba(129,140,248,0.06) !important; }
.current-app { background: rgba(129,140,248,0.08) !important; border-left: 2px solid #818cf8 !important; }
.current-app .section { color: #818cf8 !important; font-weight: 700 !important; }
.current-model > a { color: #818cf8 !important; font-weight: 600 !important; }

/* Content */
#content, #content-main, .colMS, #container, #main { background: #0f1117 !important; color: #e2e8f0 !important; }
#content { padding: 24px 28px !important; }
#content h1 { color: #f1f5f9 !important; font-family: 'Syne', sans-serif !important; font-size: 1.25rem !important; font-weight: 700 !important; border-bottom: 1px solid #2a2f45 !important; padding-bottom: 14px !important; margin-bottom: 20px !important; }

/* Modules */
.module { background: #1a1d27 !important; border: 1px solid #2a2f45 !important; border-radius: 12px !important; overflow: hidden !important; box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important; margin-bottom: 16px !important; }
.module caption, .module > h2 { background: #22263a !important; color: #64748b !important; font-family: 'Syne', sans-serif !important; font-size: 0.7rem !important; font-weight: 700 !important; letter-spacing: 0.1em !important; text-transform: uppercase !important; padding: 10px 16px !important; border-bottom: 1px solid #2a2f45 !important; }
.module td, .module th { background: transparent !important; border-bottom: 1px solid #2a2f45 !important; color: #e2e8f0 !important; padding: 11px 16px !important; font-size: 0.88rem !important; }
.module tr:last-child td { border-bottom: none !important; }
.module td a { color: #e2e8f0 !important; text-decoration: none !important; font-weight: 500 !important; }
.module td a:hover { color: #818cf8 !important; }
.addlink { color: #34d399 !important; font-size: 0.8rem !important; font-weight: 600 !important; }
.changelink { color: #818cf8 !important; font-size: 0.8rem !important; }

/* Recent actions */
.actionlist { padding: 0 !important; margin: 0 !important; }
.actionlist li { border-bottom: 1px solid #2a2f45 !important; padding: 9px 16px !important; color: #94a3b8 !important; font-size: 0.84rem !important; list-style: none !important; }
.actionlist li:last-child { border-bottom: none !important; }
.actionlist li a { color: #818cf8 !important; }

/* Change list */
#changelist { background: #1a1d27 !important; border: 1px solid #2a2f45 !important; border-radius: 12px !important; overflow: hidden !important; }
#changelist table { background: transparent !important; width: 100% !important; border-collapse: collapse !important; }
#changelist thead th { background: #22263a !important; color: #64748b !important; font-size: 0.7rem !important; font-weight: 700 !important; letter-spacing: 0.08em !important; text-transform: uppercase !important; border-bottom: 1px solid #2a2f45 !important; padding: 10px 14px !important; }
#changelist thead th a, #changelist thead th a:visited { color: #64748b !important; text-decoration: none !important; }
#changelist thead th a:hover { color: #e2e8f0 !important; }
#changelist tbody tr { border-bottom: 1px solid rgba(42,47,69,0.8) !important; }
#changelist tbody tr:hover td { background: rgba(129,140,248,0.05) !important; }
#changelist tbody td { background: transparent !important; color: #e2e8f0 !important; padding: 11px 14px !important; font-size: 0.88rem !important; border: none !important; }
#changelist tbody td a { color: #818cf8 !important; text-decoration: none !important; }
.row1, .row2 { background: transparent !important; }

/* Toolbar */
#toolbar { background: #22263a !important; border-bottom: 1px solid #2a2f45 !important; padding: 10px 14px !important; }
#searchbar, #toolbar input[type=text] { background: #0f1117 !important; border: 1px solid #2a2f45 !important; border-radius: 7px !important; color: #e2e8f0 !important; padding: 6px 12px !important; font-size: 0.88rem !important; outline: none !important; }
#searchbar:focus { border-color: #818cf8 !important; }
#toolbar input[type=submit] { background: #22263a !important; border: 1px solid #2a2f45 !important; color: #e2e8f0 !important; border-radius: 7px !important; padding: 6px 14px !important; cursor: pointer !important; }
#toolbar input[type=submit]:hover { border-color: #818cf8 !important; color: #818cf8 !important; }

/* Filters */
#changelist-filter { background: #1a1d27 !important; border-left: 1px solid #2a2f45 !important; }
#changelist-filter h2 { background: #22263a !important; color: #64748b !important; font-size: 0.7rem !important; letter-spacing: 0.1em !important; text-transform: uppercase !important; padding: 10px 14px !important; border-bottom: 1px solid #2a2f45 !important; }
#changelist-filter h3 { color: #4a5568 !important; font-size: 0.7rem !important; text-transform: uppercase !important; margin: 12px 14px 4px !important; }
#changelist-filter ul { padding: 0 14px 10px !important; margin: 0 !important; }
#changelist-filter li { list-style: none !important; padding: 3px 0 !important; }
#changelist-filter a { color: #94a3b8 !important; font-size: 0.85rem !important; text-decoration: none !important; }
#changelist-filter a:hover, #changelist-filter li.selected a { color: #818cf8 !important; font-weight: 600 !important; }

/* Actions */
.actions { background: #22263a !important; border: 1px solid #2a2f45 !important; border-radius: 8px !important; padding: 8px 14px !important; }
.actions select { background: #0f1117 !important; border: 1px solid #2a2f45 !important; color: #e2e8f0 !important; border-radius: 6px !important; padding: 4px 8px !important; }
.actions label { color: #64748b !important; }

/* Buttons */
.button, input[type=submit], input[type=button], .submit-row input, a.button { background: #818cf8 !important; border: none !important; border-radius: 8px !important; color: #0f1117 !important; font-family: 'Syne', sans-serif !important; font-weight: 700 !important; padding: 7px 18px !important; cursor: pointer !important; font-size: 0.85rem !important; text-decoration: none !important; }
.button:hover { background: #6366f1 !important; }
.object-tools a { background: rgba(129,140,248,0.1) !important; border: 1px solid rgba(129,140,248,0.25) !important; color: #818cf8 !important; border-radius: 8px !important; padding: 6px 14px !important; font-size: 0.82rem !important; font-weight: 600 !important; text-decoration: none !important; }
.object-tools a:hover { background: rgba(129,140,248,0.2) !important; }

/* Submit row */
.submit-row { background: #1a1d27 !important; border-top: 1px solid #2a2f45 !important; padding: 12px 16px !important; }

/* Paginator */
.paginator { background: #1a1d27 !important; border-top: 1px solid #2a2f45 !important; color: #64748b !important; padding: 10px 14px !important; font-size: 0.85rem !important; }
.paginator a { color: #818cf8 !important; }
.paginator .this-page { background: #818cf8 !important; color: #0f1117 !important; border-radius: 4px !important; padding: 2px 7px !important; font-weight: 700 !important; }

/* Messages */
li.success { background: rgba(52,211,153,0.1) !important; border: 1px solid rgba(52,211,153,0.25) !important; color: #6ee7b7 !important; border-radius: 8px !important; padding: 10px 16px !important; list-style: none !important; margin-bottom: 8px !important; }
li.error { background: rgba(239,68,68,0.1) !important; border: 1px solid rgba(239,68,68,0.25) !important; color: #fca5a5 !important; border-radius: 8px !important; padding: 10px 16px !important; list-style: none !important; margin-bottom: 8px !important; }
li.warning { background: rgba(251,191,36,0.1) !important; border: 1px solid rgba(251,191,36,0.25) !important; color: #fde68a !important; border-radius: 8px !important; padding: 10px 16px !important; list-style: none !important; margin-bottom: 8px !important; }

/* Forms */
input[type=text], input[type=password], input[type=email], input[type=number], select, textarea { background: #0f1117 !important; border: 1px solid #2a2f45 !important; border-radius: 8px !important; color: #e2e8f0 !important; padding: 7px 12px !important; font-family: 'DM Sans', sans-serif !important; }
input:focus, select:focus, textarea:focus { border-color: #818cf8 !important; box-shadow: 0 0 0 3px rgba(129,140,248,0.12) !important; outline: none !important; }
label { color: #94a3b8 !important; font-size: 0.85rem !important; }
.help { color: #64748b !important; font-size: 0.8rem !important; }
input[type=checkbox] { accent-color: #818cf8 !important; }
</style>

<script>
document.documentElement.setAttribute('data-theme', 'dark');
localStorage.setItem('theme', 'dark');
</script>
{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}" style="display:flex;align-items:center;gap:0.6rem;text-decoration:none;">
    <span style="width:30px;height:30px;background:linear-gradient(135deg,#818cf8,#a78bfa);border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:0.95rem;">🩺</span>
    <span style="font-family:'Syne',sans-serif;font-weight:800;color:#f1f5f9;letter-spacing:-0.01em;">MediPredict</span>
    <span style="font-size:0.65rem;background:rgba(129,140,248,0.12);border:1px solid rgba(129,140,248,0.3);color:#818cf8;padding:2px 8px;border-radius:6px;font-weight:700;letter-spacing:0.05em;">ADMIN</span>
  </a>
</h1>
{% endblock %}
