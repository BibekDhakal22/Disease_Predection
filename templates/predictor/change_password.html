<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — MediPredict</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
nav { background:#1e293b; padding:0 2rem; height:60px; display:flex; align-items:center; gap:0.6rem; box-shadow:0 1px 0 #334155; }
.logo { display:flex; align-items:center; gap:0.6rem; text-decoration:none; }
.logo-icon { width:32px; height:32px; background:#2563eb; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:14px; }
.logo-text { font-family:'Syne',sans-serif; font-weight:800; color:white; font-size:1.05rem; }
.logo-text span { color:#60a5fa; }
.nav-links { margin-left:auto; display:flex; align-items:center; gap:1.5rem; }
.nav-links a { color:#94a3b8; text-decoration:none; font-size:0.85rem; }
.nav-links a:hover { color:white; }
.nav-badge { background:#1d4ed8; color:#bfdbfe; font-size:0.72rem; font-weight:600; padding:0.25rem 0.75rem; border-radius:100px; }
main { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
.card { background:white; border:1px solid #e2e8f0; border-radius:16px; padding:2.5rem; width:100%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
.card-icon { width:48px; height:48px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.4rem; margin-bottom:1.25rem; }
h1 { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; color:#0f172a; margin-bottom:0.3rem; }
p.sub { color:#64748b; font-size:0.88rem; margin-bottom:1.75rem; }
.field { margin-bottom:1rem; }
label { display:block; font-size:0.75rem; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:#64748b; margin-bottom:0.4rem; }
input { width:100%; background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:9px; padding:0.78rem 1rem; color:#0f172a; font-size:0.92rem; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.15s; }
input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1); background:white; }
.success { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; border-radius:8px; padding:0.65rem 0.9rem; font-size:0.85rem; margin-bottom:1rem; }
.error { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; border-radius:8px; padding:0.65rem 0.9rem; font-size:0.85rem; margin-bottom:1rem; }
button { width:100%; padding:0.88rem; background:#2563eb; border:none; border-radius:10px; color:white; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; margin-top:0.5rem; transition:background 0.15s; }
button:hover { background:#1d4ed8; }
.back-link { text-align:center; margin-top:1.25rem; font-size:0.85rem; color:#64748b; }
.back-link a { color:#2563eb; text-decoration:none; font-weight:600; }
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <div class="logo-icon">🩺</div>
    <div class="logo-text">Medi<span>Predict</span></div>
  </a>
  <div class="nav-links">
    <a href="/">Predict</a>
    <a href="/profile/">Profile</a>
    <span class="nav-badge">{{ request.user.username }}</span>
    <a href="/logout/">Logout</a>
  </div>
</nav>
<main>
  <div class="card">
    <div class="card-icon">🔐</div>
    <h1>Change Password</h1>
    <p class="sub">Update your account password below.</p>
    {% for message in messages %}
    <div class="{% if 'successfully' in message.message %}success{% else %}error{% endif %}">{{ message }}</div>
    {% endfor %}
    <form method="POST">
      {% csrf_token %}
      <div class="field"><label>Current Password</label><input type="password" name="current_password" placeholder="Enter current password" required></div>
      <div class="field"><label>New Password</label><input type="password" name="new_password" placeholder="Enter new password" required></div>
      <div class="field"><label>Confirm New Password</label><input type="password" name="confirm_password" placeholder="Repeat new password" required></div>
      <button type="submit">Update Password</button>
    </form>
    <div class="back-link"><a href="/profile/">← Back to Profile</a></div>
  </div>
</main>
</body>
</html>
