<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — MediPredict</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0e1a; color:#e2e8f0; font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,212,255,0.07),transparent); }
  header { border-bottom:1px solid #1e2d45; padding:1.2rem 2rem; display:flex; align-items:center; gap:0.75rem; background:rgba(10,14,26,0.85); }
  .logo-icon { width:38px; height:38px; background:linear-gradient(135deg,#00d4ff,#7c3aed); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
  .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; }
  .logo-text span { color:#00d4ff; }
  .nav-links { margin-left:auto; display:flex; gap:1rem; align-items:center; }
  .nav-links a { color:#64748b; text-decoration:none; font-size:0.88rem; transition:color 0.2s; }
  .nav-links a:hover { color:#00d4ff; }
  .user-badge { background:rgba(0,212,255,0.1); border:1px solid rgba(0,212,255,0.25); color:#00d4ff; font-size:0.78rem; padding:0.3rem 0.8rem; border-radius:100px; }
  main { flex:1; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .card { background:#111827; border:1px solid #1e2d45; border-radius:20px; padding:2.5rem; width:100%; max-width:460px; }
  .card-header { margin-bottom:2rem; }
  .card-header h1 { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:0.3rem; }
  .card-header p { color:#64748b; font-size:0.9rem; }
  .field { margin-bottom:1.1rem; }
  label { display:block; font-size:0.78rem; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:#64748b; margin-bottom:0.4rem; }
  input { width:100%; background:#0a0e1a; border:1px solid #1e2d45; border-radius:10px; padding:0.8rem 1rem; color:#e2e8f0; font-size:0.95rem; font-family:'DM Sans',sans-serif; outline:none; transition:border-color 0.2s; }
  input:focus { border-color:#00d4ff; }
  .success { background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3); color:#86efac; border-radius:8px; padding:0.7rem 1rem; font-size:0.88rem; margin-bottom:1rem; }
  .error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; border-radius:8px; padding:0.7rem 1rem; font-size:0.88rem; margin-bottom:1rem; }
  button { width:100%; padding:0.9rem; background:linear-gradient(135deg,#00d4ff,#7c3aed); border:none; border-radius:12px; color:white; font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; margin-top:0.5rem; transition:opacity 0.2s; }
  button:hover { opacity:0.9; }
  .back-link { text-align:center; margin-top:1.25rem; font-size:0.88rem; color:#64748b; }
  .back-link a { color:#00d4ff; text-decoration:none; }
</style>
</head>
<body>
<header>
  <div class="logo-icon">🩺</div>
  <div class="logo-text">Medi<span>Predict</span></div>
  <div class="nav-links">
    <a href="/">Predict</a>
    <a href="/history/">History</a>
    <a href="/profile/">Profile</a>
    <span class="user-badge">{{ request.user.username }}</span>
    <a href="/logout/">Logout</a>
  </div>
</header>
<main>
  <div class="card">
    <div class="card-header">
      <h1>🔐 Change Password</h1>
      <p>Update your account password below.</p>
    </div>
    {% for message in messages %}
      <div class="{% if 'successfully' in message.message %}success{% else %}error{% endif %}">{{ message }}</div>
    {% endfor %}
    <form method="POST">
      {% csrf_token %}
      <div class="field">
        <label>Current Password</label>
        <input type="password" name="current_password" placeholder="Enter current password" required>
      </div>
      <div class="field">
        <label>New Password</label>
        <input type="password" name="new_password" placeholder="Enter new password" required>
      </div>
      <div class="field">
        <label>Confirm New Password</label>
        <input type="password" name="confirm_password" placeholder="Repeat new password" required>
      </div>
      <button type="submit">Update Password</button>
    </form>
    <div class="back-link"><a href="/profile/">← Back to Profile</a></div>
  </div>
</main>
</body>
</html>
