<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — MediPredict</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0e1a; color:#e2e8f0;
    font-family:'DM Sans',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.08), transparent);
  }
  .card {
    background:#111827; border:1px solid #1e2d45;
    border-radius:20px; padding:2.5rem;
    width:100%; max-width:420px;
  }
  .logo { display:flex; align-items:center; gap:0.6rem; margin-bottom:2rem; }
  .logo-icon { width:36px; height:36px; background:linear-gradient(135deg,#00d4ff,#7c3aed); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
  .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; }
  .logo-text span { color:#00d4ff; }
  h2 { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; margin-bottom:0.4rem; }
  p.sub { color:#64748b; font-size:0.9rem; margin-bottom:1.75rem; }
  .field { margin-bottom:1.1rem; }
  label { display:block; font-size:0.78rem; font-weight:600; letter-spacing:0.07em; text-transform:uppercase; color:#64748b; margin-bottom:0.4rem; }
  input {
    width:100%; background:#0a0e1a; border:1px solid #1e2d45;
    border-radius:10px; padding:0.8rem 1rem; color:#e2e8f0;
    font-size:0.95rem; font-family:'DM Sans',sans-serif; outline:none;
    transition:border-color 0.2s;
  }
  input:focus { border-color:#00d4ff; }
  .error {
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
    color:#fca5a5; border-radius:8px; padding:0.65rem 0.9rem;
    font-size:0.85rem; margin-bottom:1rem;
  }
  button {
    width:100%; padding:0.9rem;
    background:linear-gradient(135deg,#00d4ff,#7c3aed);
    border:none; border-radius:12px; color:white;
    font-family:'Syne',sans-serif; font-size:1rem; font-weight:700;
    cursor:pointer; margin-top:0.5rem; transition:opacity 0.2s;
  }
  button:hover { opacity:0.9; }
  .footer-link { text-align:center; margin-top:1.25rem; font-size:0.88rem; color:#64748b; }
  .footer-link a { color:#00d4ff; text-decoration:none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🩺</div>
    <div class="logo-text">Medi<span>Predict</span></div>
  </div>
  <h2>Create account</h2>
  <p class="sub">Join MediPredict to save your prediction history</p>

  {% for message in messages %}
  <div class="error">{{ message }}</div>
  {% endfor %}

  <form method="POST">
    {% csrf_token %}
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Choose a username" required>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="your@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" name="confirm" placeholder="Repeat your password" required>
    </div>
    <button type="submit">Create Account</button>
  </form>
  <div class="footer-link">
    Already have an account? <a href="/login/">Sign in</a>
  </div>
</div>
</body>
</html>
